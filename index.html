<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAYA | GLOBAL ACADEMIC AI</title>
    <style>
        :root { --gold: #f59e0b; --bg: #030712; --primary: #10b981; --text: #e5e7eb; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 96%; height: 94vh; background: #111827; display: flex; flex-direction: column; padding: 20px; border-radius: 20px; border: 1px solid #374151; }
        #chat-box { flex: 1; overflow-y: auto; background: #000; border-radius: 15px; padding: 20px; border: 1px solid #1f2937; margin-bottom: 15px; }
        .msg { margin-bottom: 20px; line-height: 1.6; }
        .amaya { color: #93c5fd; border-left: 4px solid var(--primary); padding-left: 15px; }
        .user { color: #9ca3af; text-align: right; }
        .input-area { display: flex; gap: 10px; background: #1f2937; padding: 15px; border-radius: 15px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        button { background: var(--primary); border: none; color: white; padding: 10px 25px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: var(--gold);">AMAYA</h1>
        <div id="chat-box"><div class="msg amaya"><b>System:</b> Secure JSONP Bridge Active. AMAYA is ready.</div></div>
        <div class="input-area">
            <input type="text" id="query" placeholder="Ask AMAYA..." autocomplete="off">
            <button onclick="askAmaya()">SEND</button>
        </div>
    </div>

    <script>
        const bridge = "https://script.google.com/macros/s/AKfycbzm8oTNifIX4PNLsdpBYCNp339iRE4lHVEDjziAh4O_Rq0iI_q7g0OhV9t3o4GerWc4/exec"; 

        function askAmaya() {
            const q = document.getElementById('query');
            const val = q.value.trim();
            if(!val) return;

            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg user"><b>You:</b> ${val}</div>`;
            
            const amayaMsg = document.createElement('div');
            amayaMsg.className = "msg amaya";
            amayaMsg.id = "temp-msg";
            amayaMsg.innerHTML = "<b>AMAYA:</b> <i>Bypassing security filters...</i>";
            box.appendChild(amayaMsg);

            // JSONP റിക്വസ്റ്റ് അയക്കുന്നു
            const script = document.createElement('script');
            script.src = `${bridge}?q=${encodeURIComponent(val)}&callback=handleResponse`;
            document.body.appendChild(script);
            
            q.value = "";
            box.scrollTop = box.scrollHeight;
        }

        // മറുപടി വരുമ്പോൾ ഇത് പ്രവർത്തിക്കും
        window.handleResponse = function(data) {
            const amayaMsg = document.getElementById('temp-msg');
            if (amayaMsg) {
                amayaMsg.innerHTML = `<b>AMAYA:</b> ${data.candidates[0].content.parts[0].text}`;
                amayaMsg.id = ""; // ID മാറ്റുന്നു
            }
            const scripts = document.querySelectorAll('script[src*="callback=handleResponse"]');
            scripts.forEach(s => s.remove()); // പഴയ സ്ക്രിപ്റ്റുകൾ നീക്കം ചെയ്യുന്നു
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        };
    </script>
</body>
</html>
